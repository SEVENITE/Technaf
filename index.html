<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECHNAF Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">TECHNAF</div>

  <!-- Hero Section -->
  <div class="hero" id="heroSection">
    <h1>Welcome to TECHNAF</h1>
  </div>

  <!-- Navigation Buttons -->
  <div class="button-group">
    <button class="shop-btn" id="btnContact">
      <span class="bg"></span>
      <span class="label">CONTACT</span>
    </button>
    <button class="shop-btn" id="btnShop">
      <span class="bg"></span>
      <span class="label">SHOP</span>
    </button>
    <button class="shop-btn" id="btnUpcoming">
      <span class="bg"></span>
      <span class="label">UPCOMING</span>
    </button>
  </div>

  <!-- Sections -->
  <div id="home" class="section active">
    <h2>Homepage</h2>
    <div class="orders-box">
      <h2>YOUR ORDERS</h2>
      <div id="orderList"></div>
    </div>
  </div>

  <div id="contact" class="section">
    <h2>Contact Us</h2>
    <p>Phone: +880123456789</p>
    <p>Gmail: technaf@gmail.com</p>
    <p>WhatsApp: +880123456789</p>
  </div>

  <div id="shop" class="section">
    <h2>Shop</h2>
    <div class="shop-toggle">
      <button class="shop-btn" onclick="showProducts('best')">
        <span class="bg"></span><span class="label">BEST SELLING</span>
      </button>
      <button class="shop-btn" onclick="showProducts('latest')">
        <span class="bg"></span><span class="label">LATEST</span>
      </button>
    </div>

    <div class="products">
      <!-- Product Card -->
      <div class="product-card">
        <img id="productImage" src="images/product1.jpg" alt="Product Photo">
        <h3 id="productName">Advance Mat Light + Counter</h3>
        <p>Price: $50</p>
        <p>Rating: ⭐⭐⭐⭐</p>
        <button class="shop-btn" onclick="buyProduct('Advance Mat Light + Counter')">
          <span class="bg"></span><span class="label">BUY</span>
        </button>

        <!-- Reviews -->
        <div class="review-box">
          <h3>REVIEWS</h3>
          <div id="reviewList"></div>
          <button class="shop-btn" onclick="toggleReviewForm()">
            <span class="bg"></span><span class="label">ADD REVIEW +</span>
          </button>
          <div id="reviewForm" style="display:none; margin-top:20px;">
            <input type="text" id="reviewName" placeholder="Your Name"><br><br>
            <textarea id="reviewText" placeholder="Write your review"></textarea><br><br>
            <button class="shop-btn" onclick="submitReview()">
              <span class="bg"></span><span class="label">SUBMIT</span>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="upcoming" class="section">
    <h2>Upcoming Products</h2>
    <p>Stay tuned for new releases!</p>
  </div>

  <div id="checkout" class="section">
    <h2>Checkout</h2>
    <p>Product: <span id="selectedProduct"></span></p>
    <input type="text" id="name" placeholder="Your Name"><br><br>
    <input type="text" id="phone" placeholder="Phone Number"><br><br>
    <input type="text" id="address" placeholder="Current Address"><br><br>
    <input type="text" id="paymentNumber" placeholder="Payment Number"><br><br>
    <button class="shop-btn" onclick="placeOrder()">
      <span class="bg"></span><span class="label">PLACE ORDER</span>
    </button>
  </div>

  <script src="store.js"></script>
</body>
</html>
